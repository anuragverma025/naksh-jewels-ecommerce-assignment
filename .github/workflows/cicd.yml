# This workflow installs dependencies, builds the project, and restarts the PM2 process on the EC2 server.
name: Node.js CI/CD

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: self-hosted

    strategy:
      matrix:
        node-version: [22.x]

    steps:
    - name: Checkout Code
      uses: actions/checkout@v6

    - name: Use Node.js ${{ matrix.node-version }}
      uses: actions/setup-node@v5
      with:
        node-version: ${{ matrix.node-version }}
        cache: 'npm'

    # 1. Install dependencies for the backend
    - name: Install Backend Dependencies
      run: |
        cd backend
        npm install

    # 2. Restart the application using PM2
    - name: Restart PM2 Server
      run: |
        cd backend
        # This checks if the process is already running. If it is, it restarts. 
        # If it's the first time, it starts it with the name 'server'.
        sudo pm2 restart server || sudo pm2 start server.js --name "server"